{% extends 'base.html' %}

{% block title %}Entrar{% endblock %}

{% block content %}
<div class="box">
    <h1>Entrar</h1>
    <form method="post" novalidate>
        {% csrf_token %}
        {% for field in form %}
            <div class="form-group">
                {{ field.label_tag }}
                {{ field }}
                {% if field.errors %}
                    <div class="message error">{{ field.errors|striptags }}</div>
                {% endif %}
            </div>
        {% endfor %}
        <button type="submit">Entrar</button>
    </form>
    <p><a class="small-link" href="{% url 'register' %}">Ainda não tem conta? Registre-se</a></p>
</div>
{% endblock %}
