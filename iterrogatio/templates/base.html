<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Iterrogatio{% endblock %}</title>
    <style>
        body { margin: 0; font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f6f8fb; color: #111827; }
        .page { min-height: 100vh; display: flex; flex-direction: column; }
        header { display: flex; justify-content: space-between; align-items: center; padding: 1rem 2rem; background: #111827; color: #fff; }
        header a { color: #fff; text-decoration: none; margin-left: 1rem; }
        main { flex: 1; width: min(1100px, calc(100% - 2rem)); margin: 2rem auto; }
        .box { background: #fff; border-radius: 18px; box-shadow: 0 20px 60px rgba(15, 23, 42, 0.08); padding: 2rem; }
        .brand { font-size: 1.1rem; font-weight: 700; letter-spacing: 0.05em; }
        .actions { display: flex; gap: 1rem; }
        .message { margin-bottom: 1rem; padding: 0.9rem 1rem; border-radius: 12px; }
        .message.error { background: #fee2e2; color: #b91c1c; }
        .message.success { background: #d1fae5; color: #065f46; }
        .message.info { background: #dbeafe; color: #1e40af; }
        .form-group { margin-bottom: 1rem; }
        label { display: block; margin-bottom: 0.4rem; font-weight: 600; }
        input { width: 100%; padding: 0.95rem 1rem; border: 1px solid #d1d5db; border-radius: 12px; font-size: 1rem; }
        button { width: 100%; margin-top: 0.5rem; padding: 0.95rem 1rem; border: none; border-radius: 12px; background: #111827; color: #fff; font-size: 1rem; cursor: pointer; }
        button:hover { background: #1f2937; }
        .small-link { display: inline-block; margin-top: 1rem; color: #2563eb; text-decoration: none; }
        .small-link:hover { text-decoration: underline; }
        .actions a { color: #fff; border: 1px solid rgba(255,255,255,.2); padding: 0.55rem 0.9rem; border-radius: 999px; }
    </style>
</head>
<body>
    <div class="page">
        <header>
            <div class="brand"><a href="{% url 'home' %}">INTERROGATIO</a></div>
            <div class="actions">
                {% if user.is_authenticated %}
                    <a href="{% url 'logout' %}">Sair</a>
                {% else %}
                    <a href="{% url 'login' %}">Entrar</a>
                    <a href="{% url 'register' %}">Registrar</a>
                {% endif %}
            </div>
        </header>
        <main>
            {% if messages %}
                {% for message in messages %}
                    <div class="message {{ message.tags }}">{{ message }}</div>
                {% endfor %}
            {% endif %}
            {% block content %}{% endblock %}
        </main>
    </div>
</body>
</html>
